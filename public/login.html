<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>Login</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<script>
			const params = new URLSearchParams(window.location.search);
			const verified = params.get("verified");

			if (verified === "true") {
				alert("✅ Email verified successfully! Please login.");
			}

			if (verified === "false") {
				alert("❌ Invalid or expired verification link.");
			}
		</script>
	</head>

	<body
		class="min-h-screen flex items-center justify-center bg-slate-900 text-white"
	>
		<div class="bg-slate-800 p-8 rounded-2xl w-96 shadow-xl">
			<h2 class="text-2xl font-bold mb-6 text-center text-emerald-400">
				Login
			</h2>

			<form
				id="loginForm"
				class="space-y-4"
			>
				<input
					type="email"
					placeholder="Email"
					class="w-full p-3 rounded bg-slate-700 outline-none"
					required
				/>

				<input
					type="password"
					placeholder="Password"
					class="w-full p-3 rounded bg-slate-700 outline-none"
					required
				/>

				<button
					class="w-full bg-emerald-500 p-3 rounded font-bold hover:bg-emerald-400"
				>
					Login
				</button>
			</form>

			<p class="text-center mt-4 text-sm text-slate-400">
				Don't have an account?
				<a
					href="/signup.html"
					class="text-cyan-400"
					>Signup</a
				>
			</p>
		</div>

		<script>
			async function checkAuth() {
				try {
					const res = await fetch("/auth/me", {
						credentials: "include",
					});

					if (res.ok) {
						window.location.href = "/";
					}
				} catch (err) {
					console.log("User not logged in ");
				}
			}

			checkAuth();

			/*************************************************************/

			document
				.getElementById("loginForm")
				.addEventListener("submit", async (e) => {
					e.preventDefault();

					const email = e.target[0].value;
					const password = e.target[1].value;

					const res = await fetch("/auth/sign-in", {
						method: "POST",
						headers: { "Content-Type": "application/json" },
						body: JSON.stringify({ email, password }),
					});

					const data = await res.json();

					if (res.ok) {
						alert("Login successful");
						window.location.href = "/";
					} else {
						alert(data.message || "Login failed");
					}
				});
		</script>
	</body>
</html>
